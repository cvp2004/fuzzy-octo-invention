site_name: lsm-kv Documentation
site_description: Production-grade Log-Structured Merge Tree Key-Value Store
repo_url: https://github.com/your-org/lsm-kv

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            members_order: source
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            merge_init_into_class: true
            show_if_no_docstring: false
            inherited_members: false
            signature_crossrefs: true
          paths:
            - .

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - API Reference:
    - Engine: api/engine.md
    - Configuration: api/config.md
    - Types & Constants: api/types.md
    - Contracts (ABCs): api/abc.md
    - Exceptions: api/errors.md
  - Internals:
    - MemTable: internals/memtable.md
    - WAL: internals/wal.md
    - SSTable: internals/sstable.md
    - Bloom Filter: internals/bloom.md
    - Block Cache: internals/cache.md
    - Sparse Index: internals/index.md
    - Compaction: internals/compaction.md
    - Flush Pipeline: internals/flush.md
    - Observability: internals/observability.md
  - Design Docs:
    - Architecture: design/architecture.md
    - Read & Write Flow: design/read-write-flow.md
    - MemTable: design/memtable-impl.md
    - MemTable Manager: design/memtable-manager.md
    - SSTable Format: design/sstable-format.md
    - SSTable Manager: design/sstable-manager.md
    - Common Components: design/common-components.md
    - Async I/O Integration: design/async-io.md
    - Async I/O Guidelines: design/async-io-guidelines.md
    - Flush Pipeline: design/flush-pipeline.md
    - Parallel Flush: design/parallel-flush.md
    - Compaction Spec: design/compaction-spec.md
    - Compaction Manager: design/compaction-manager.md
